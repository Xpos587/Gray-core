site_name: Gray-core Documentation
site_url: https://xpos587.github.io/Gray-core/
site_description: Network proxy platform for educational research
site_author: Xpos587

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang:
        - en
        - ru

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - admonition

extra:
  alternate:
    - language: en
      name: English
      link: /en/
    - language: ru
      name: Русский
      link: /ru/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Xpos587/Gray-core

# Directory configuration
docs_dir: docs
site_dir: site

# Navigation
nav:
  - Home: index.md
  - Russian:
    - ru/index.md
    - TSPU (Research Materials): ru/tspu/index.md
    - Research: ru/tspu/research.md
    - Packet Morphing: ru/tspu/packet-morphing.md
    - Timing Randomization: ru/tspu/timing-randomization.md
    - User Guide: ru/tspu/user-guide.md
    - Chapters:
      - ru/tspu/chapters/01.md
      - ru/tspu/chapters/02.md
      - ru/tspu/chapters/03.md
      - ru/tspu/chapters/04.md
    - Developers:
      - ru/dev/index.md
      - Architecture: ru/dev/architecture.md
      - Contributing: ru/dev/contributing.md
  - English:
    - en/index.md
    - Developers:
      - en/dev/index.md
      - Architecture: en/dev/architecture.md
      - Contributing: en/dev/contributing.md

